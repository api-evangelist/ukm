---
aid: ukm
name: Universiti Kebangsaan Malaysia
description: >-
  Universiti Kebangsaan Malaysia (UKM), The National University of Malaysia, is
  a public research university in Bangi, Selangor, ranked #138 in the QS World
  University Rankings 2025. Its public, machine-readable developer footprint is
  concentrated in scholarly-communication infrastructure operated by the
  Perpustakaan Tun Seri Lanang (UKM Library): a DSpace-based UKM Learning and
  Research Repository and an EPrints-based UKM Journal Article Repository, both
  of which expose standards-based OAI-PMH harvesting interfaces. UKM does not
  publish a general-purpose developer portal; student and staff online services
  are gated behind institutional single sign-on and are not openly documented.
