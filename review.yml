    summary: >-
      UKM has no general-purpose developer portal or openly documented web APIs;
      most student/staff online services sit behind institutional single
      sign-on. The verifiable, machine-readable footprint is library-operated
      scholarly infrastructure: the DSpace UKM Learning and Research Repository
      OAI-PMH endpoint was confirmed live (valid OAI-PMH 2.0 Identify), and the
      EPrints UKM Journal Article Repository is registry-confirmed (ROAR /
      OpenDOAR) as OAI-PMH 2.0 capable but its host did not respond to automated
      probes during this review. No official UKM GitHub organization was found
      (github.com/ukm is an unrelated personal account and was excluded). No
      endpoints were fabricated.
